name: Release

env:
  ANDROID_API_LEVEL: 24
  ANDROID_NDK_VERSION: 29.0.14206865
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ZIG_VERSION: "0.15.2"

on:
  push:
    tags: ['v*.*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-gnu
            zig_cpu: ""
            ext: ""
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
            zig_cpu: ""
            ext: ""
          - os: macos-latest
            target: macos-x86_64
            zig_target: x86_64-macos
            zig_cpu: ""
            ext: ""
          - os: windows-latest
            target: windows-x86_64
            zig_target: x86_64-windows
            zig_cpu: ""
            ext: ".exe"
          - os: windows-latest
            target: windows-aarch64
            zig_target: aarch64-windows
            zig_cpu: ""
            ext: ".exe"

    steps:
      - uses: actions/checkout@v6

      - name: Install Zig 0.15.2
        run: bash .github/scripts/install-zig.sh "${ZIG_VERSION}"

      - name: Install Linux Desktop Dependencies
        if: startsWith(matrix.target, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Resolve build version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ReleaseSmall
        run: |
          zig_target="${{ matrix.zig_target }}"
          zig_args=(
            -Doptimize=ReleaseSmall
            -Dtarget=${zig_target}
            -Dversion=${{ steps.version.outputs.value }}
          )
          if [ -n "${{ matrix.zig_cpu }}" ]; then
            zig_args+=(-Dcpu=${{ matrix.zig_cpu }})
          fi
          zig build "${zig_args[@]}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nullclaw-${{ matrix.target }}
          path: zig-out/bin/nullclaw${{ matrix.ext }}

  release:
    needs: build
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8

      - name: Rename binaries
        run: |
          mv nullclaw-linux-x86_64/nullclaw nullclaw-linux-x86_64.bin
          mv nullclaw-macos-aarch64/nullclaw nullclaw-macos-aarch64.bin
          mv nullclaw-macos-x86_64/nullclaw nullclaw-macos-x86_64.bin
          mv nullclaw-windows-x86_64/nullclaw.exe nullclaw-windows-x86_64.exe
          mv nullclaw-windows-aarch64/nullclaw.exe nullclaw-windows-aarch64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }}
          prerelease: ${{ github.event_name == 'pull_request' }}
          files: |
            nullclaw-linux-x86_64.bin
            nullclaw-macos-aarch64.bin
            nullclaw-macos-x86_64.bin
            nullclaw-windows-x86_64.exe
            nullclaw-windows-aarch64.exe
          generate_release_notes: true
