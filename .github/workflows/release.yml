name: Release

on:
  push:
    tags: ['v*.*']
  pull_request:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # v2 handles the new tarball naming (zig-x86_64-linux vs zig-linux-x86_64)
      # and resolves version from build.zig.zon if omitted.
      # Pin to 0.15.2 to match upstream nullclaw's required Zig version.
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cross-compile all targets
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist

          declare -A TARGETS=(
            [linux-x86_64]=x86_64-linux-gnu
            [linux-aarch64]=aarch64-linux-gnu
            [macos-aarch64]=aarch64-macos
            [macos-x86_64]=x86_64-macos
            [windows-x86_64]=x86_64-windows
            [windows-aarch64]=aarch64-windows
          )

          for NAME in "${!TARGETS[@]}"; do
            echo "::group::Building $NAME"
            zig build -Doptimize=ReleaseSmall -Dtarget="${TARGETS[$NAME]}" -Dversion="$VERSION"

            if [[ "$NAME" == windows-* ]]; then
              cp zig-out/bin/nullclaw.exe "dist/nullclaw-${NAME}.exe"
            else
              cp zig-out/bin/nullclaw "dist/nullclaw-${NAME}"
            fi
            echo "::endgroup::"
          done

      - name: Create tarballs (Linux + macOS)
        run: |
          cd dist
          for f in nullclaw-linux-* nullclaw-macos-*; do
            [ -f "$f" ] || continue
            chmod +x "$f"
            tar -czf "${f}.tar.gz" "$f"
            rm "$f"
          done

      - name: Create zip archives (Windows)
        run: |
          cd dist
          for f in nullclaw-windows-*.exe; do
            [ -f "$f" ] || continue
            zip "${f%.exe}.zip" "$f"
            rm "$f"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-platforms
          path: dist/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
