name: Release

on:
  push:
    tags: ['v*.*']
  pull_request:
  workflow_dispatch:

jobs:
  # Linux + Windows targets: cross-compiled from a single Ubuntu runner.
  # No native runners needed — Zig handles this natively.
  build-linux-windows:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cross-compile Linux + Windows
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist

          declare -A TARGETS=(
            [linux-x86_64]=x86_64-linux-gnu
            [linux-aarch64]=aarch64-linux-gnu
            [windows-x86_64]=x86_64-windows
            [windows-aarch64]=aarch64-windows
          )

          for NAME in "${!TARGETS[@]}"; do
            echo "::group::Building $NAME"
            zig build -Doptimize=ReleaseSmall -Dtarget="${TARGETS[$NAME]}" -Dversion="$VERSION"

            if [[ "$NAME" == windows-* ]]; then
              cp zig-out/bin/nullclaw.exe "dist/nullclaw-${NAME}.exe"
            else
              cp zig-out/bin/nullclaw "dist/nullclaw-${NAME}"
            fi
            echo "::endgroup::"
          done

      - name: Package Linux tarballs
        run: |
          cd dist
          for f in nullclaw-linux-*; do
            [ -f "$f" ] || continue
            chmod +x "$f"
            tar -czf "${f}.tar.gz" "$f"
            rm "$f"
          done

      - name: Package Windows zips
        run: |
          cd dist
          for f in nullclaw-windows-*.exe; do
            [ -f "$f" ] || continue
            zip "${f%.exe}.zip" "$f"
            rm "$f"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux-windows
          path: dist/

  # macOS targets: must build on macOS due to WebKit framework dependency.
  # The webviewStatic lib links -framework WebKit, which requires macOS SDK.
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-aarch64
            zig_target: aarch64-macos
          - target: macos-x86_64
            zig_target: x86_64-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          zig build -Doptimize=ReleaseSmall -Dtarget=${{ matrix.zig_target }} -Dversion="$VERSION"

      - name: Package DMG
        run: |
          mkdir -p "Nullclaw.app/Contents/MacOS"
          cp zig-out/bin/nullclaw "Nullclaw.app/Contents/MacOS/"
          hdiutil create -volname "Nullclaw" -srcfolder "Nullclaw.app" -ov -format UDZO nullclaw-${{ matrix.target }}.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: nullclaw-${{ matrix.target }}.dmg

  # Collect all artifacts, generate checksums, publish release.
  release:
    needs: [build-linux-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
