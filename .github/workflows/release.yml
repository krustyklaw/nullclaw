name: Release

env:
  ANDROID_API_LEVEL: 24
  ANDROID_NDK_VERSION: 29.0.14206865
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags: ['v*.*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-gnu
            zig_cpu: ""
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
            zig_cpu: ""
          - os: macos-latest
            target: macos-x86_64
            zig_target: x86_64-macos
            zig_cpu: ""
          - os: windows-latest
            target: windows-x86_64
            zig_target: x86_64-windows
            zig_cpu: ""
          - os: windows-latest
            target: windows-aarch64
            zig_target: aarch64-windows
            zig_cpu: ""

    steps:
      - uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.15.2"

      - name: Install Linux Desktop Dependencies
        if: startsWith(matrix.target, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev pkg-config

      - name: Set macOS SDK root
        if: startsWith(matrix.target, 'macos-')
        run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Resolve build version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ReleaseSmall
        run: |
          zig_target="${{ matrix.zig_target }}"
          zig_args=(
            -Doptimize=ReleaseSmall
            -Dtarget=${zig_target}
            -Dversion=${{ steps.version.outputs.value }}
          )
          if [ -n "${{ matrix.zig_cpu }}" ]; then
            zig_args+=(-Dcpu=${{ matrix.zig_cpu }})
          fi
          zig build "${zig_args[@]}"

      # ── Linux: package as AppImage ────────────────────────────────────────
      - name: Package AppImage (Linux)
        if: matrix.target == 'linux-x86_64'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp zig-out/bin/nullclaw AppDir/usr/bin/nullclaw
          cp nullclaw.png AppDir/usr/share/icons/hicolor/256x256/apps/nullclaw.png

          cat > AppDir/usr/share/applications/nullclaw.desktop <<'EOF'
          [Desktop Entry]
          Name=Nullclaw
          Exec=nullclaw
          Icon=nullclaw
          Type=Application
          Categories=Utility;AI;
          EOF

          DEPLOY_GTK_VERSION=3 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --output appimage

          mv Nullclaw-*.AppImage nullclaw-linux-x86_64.AppImage

      # ── macOS: package as .app bundle inside a .dmg ───────────────────────
      - name: Package .app + .dmg (macOS)
        if: startsWith(matrix.target, 'macos-')
        run: |
          APP="Nullclaw.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp zig-out/bin/nullclaw "$APP/Contents/MacOS/nullclaw"

          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>      <string>nullclaw</string>
            <key>CFBundleIdentifier</key>      <string>com.nullclaw.nullclaw</string>
            <key>CFBundleName</key>            <string>Nullclaw</string>
            <key>CFBundleVersion</key>         <string>${{ steps.version.outputs.value }}</string>
            <key>CFBundleShortVersionString</key><string>${{ steps.version.outputs.value }}</string>
            <key>CFBundlePackageType</key>     <string>APPL</string>
            <key>NSHighResolutionCapable</key> <true/>
            <key>LSMinimumSystemVersion</key>  <string>12.0</string>
          </dict>
          </plist>
          EOF

          # Ad-hoc sign so Gatekeeper doesn't block it on first launch
          codesign --force --deep --sign - "$APP"

          # Wrap in a .dmg
          hdiutil create \
            -volname "Nullclaw" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            nullclaw-${{ matrix.target }}.dmg

      # ── Windows: wrap in a self-extracting zip ────────────────────────────
      # WebView2 is built into Windows 10/11 so the .exe runs as-is.
      # We just rename it to something user-friendly.
      - name: Rename Windows binary
        if: startsWith(matrix.target, 'windows-')
        run: mv zig-out/bin/nullclaw.exe nullclaw-${{ matrix.target }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nullclaw-${{ matrix.target }}
          path: |
            nullclaw-linux-x86_64.AppImage
            nullclaw-macos-*.dmg
            nullclaw-windows-*.exe

  release:
    needs: build
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }}
          prerelease: ${{ github.event_name == 'pull_request' }}
          files: |
            nullclaw-linux-x86_64.AppImage
            nullclaw-macos-aarch64.dmg
            nullclaw-macos-x86_64.dmg
            nullclaw-windows-x86_64.exe
            nullclaw-windows-aarch64.exe
          generate_release_notes: true
