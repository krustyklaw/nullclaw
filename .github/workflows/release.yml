name: Release

on:
  push:
    tags: ['v*.*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
            zig_target: x86_64-linux-gnu
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
          - os: macos-latest
            target: macos-x86_64
            zig_target: x86_64-macos
          - os: windows-latest
            target: windows-x86_64
            zig_target: x86_64-windows
          - os: windows-latest
            target: windows-aarch64
            zig_target: aarch64-windows

    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: "0.15.2"

      - name: Dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev pkg-config

      - name: Build
        run: |
          zig build -Doptimize=ReleaseSmall -Dtarget=${{ matrix.zig_target }} -Dversion=${{ github.ref_name }}

      - name: Package AppImage (Linux)
        if: matrix.target == 'linux-x86_64'
        uses: miurahr/install-linuxdeploy-action@v1
        with:
          plugins: gtk
      
      - name: Create AppImage (Linux)
        if: matrix.target == 'linux-x86_64'
        run: |
          mkdir -p AppDir/usr/bin
          cp zig-out/bin/nullclaw AppDir/usr/bin/
          printf "[Desktop Entry]\nName=Nullclaw\nExec=nullclaw\nIcon=nullclaw\nType=Application\nCategories=Utility;AI;" > AppDir/nullclaw.desktop
          cp nullclaw.png AppDir/nullclaw.png
          DEPLOY_GTK_VERSION=3 linuxdeploy-x86_64.AppImage --appdir AppDir --plugin gtk --output appimage
          mv Nullclaw-*.AppImage nullclaw-linux-x86_64.AppImage

      - name: Package DMG (macOS)
        if: startsWith(matrix.target, 'macos-')
        run: |
          mkdir -p "Nullclaw.app/Contents/MacOS"
          cp zig-out/bin/nullclaw "Nullclaw.app/Contents/MacOS/"
          hdiutil create -volname "Nullclaw" -srcfolder "Nullclaw.app" -ov -format UDZO nullclaw-${{ matrix.target }}.dmg

      - name: Rename (Windows)
        if: startsWith(matrix.target, 'windows-')
        run: move zig-out\bin\nullclaw.exe nullclaw-${{ matrix.target }}.exe
        shell: cmd

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            nullclaw-linux-x86_64.AppImage
            nullclaw-macos-*.dmg
            nullclaw-windows-*.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nullclaw-linux-x86_64.AppImage
            nullclaw-macos-*.dmg
            nullclaw-windows-*.exe
          generate_release_notes: true
