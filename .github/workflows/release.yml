name: Release

on:
  push:
    tags: ['v*.*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
            pkg: tar
          - os: macos-latest
            target: macos-aarch64
            pkg: dmg
          - os: windows-latest
            target: windows-x86_64
            pkg: zip

    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # Do NOT pass -Dtarget — it disables system library discovery
      # (pkg-config on Linux, framework search paths on macOS).
      # Each runner is already the native arch for its target.
      - name: Build
        run: zig build -Doptimize=ReleaseSmall -Dversion=${{ github.ref_name }}

      - name: Package tarball (Linux)
        if: matrix.pkg == 'tar'
        run: |
          python3 scripts/gen_icons.py --png krustyklaw.png --size 256
          cat > krustyklaw.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=KrustyKlaw
          Comment=The AI that actually does things
          Exec=krustyklaw
          Icon=krustyklaw
          Type=Application
          Categories=Utility;
          DESKTOP
          mkdir -p pkg/bin \
                   pkg/share/applications \
                   pkg/share/icons/hicolor/256x256/apps
          cp zig-out/bin/krustyklaw pkg/bin/krustyklaw
          chmod +x pkg/bin/krustyklaw
          cp krustyklaw.desktop pkg/share/applications/krustyklaw.desktop
          cp krustyklaw.png     pkg/share/icons/hicolor/256x256/apps/krustyklaw.png
          tar -czf krustyklaw-${{ matrix.target }}.tar.gz -C pkg .

      - name: Build app icon (macOS)
        if: matrix.pkg == 'dmg'
        run: |
          python3 scripts/gen_icons.py --iconset AppIcon.iconset
          iconutil -c icns AppIcon.iconset -o AppIcon.icns

      - name: Package DMG (macOS)
        if: matrix.pkg == 'dmg'
        run: |
          mkdir -p "KrustyKlaw.app/Contents/MacOS" \
                   "KrustyKlaw.app/Contents/Resources"
          cp zig-out/bin/krustyklaw "KrustyKlaw.app/Contents/MacOS/"
          cp AppIcon.icns "KrustyKlaw.app/Contents/Resources/"
          chmod +x "KrustyKlaw.app/Contents/MacOS/krustyklaw"
          cat > "KrustyKlaw.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>krustyklaw</string>
            <key>CFBundleName</key>
            <string>KrustyKlaw</string>
            <key>CFBundleIdentifier</key>
            <string>io.nullclaw.krustyklaw</string>
            <key>CFBundleVersion</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
          </dict>
          </plist>
          EOF
          hdiutil create -volname "KrustyKlaw" -srcfolder "KrustyKlaw.app" -ov -format UDZO krustyklaw-${{ matrix.target }}.dmg

      - name: Package zip (Windows)
        if: matrix.pkg == 'zip'
        shell: pwsh
        run: Compress-Archive -Path zig-out/bin/krustyklaw.exe -DestinationPath krustyklaw-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            krustyklaw-*.tar.gz
            krustyklaw-*.dmg
            krustyklaw-*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Push binaries to binaries branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan binaries
          git rm -rf .

          mv dist/* .

          git lfs install
          git lfs track "*.tar.gz"
          git lfs track "*.dmg"
          git lfs track "*.zip"
          git lfs track "*.exe"

          git add .
          git commit -m "Update release binaries for ${{ github.ref_name }}" || true
          git push --force origin HEAD:binaries
