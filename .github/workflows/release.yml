name: Release

on:
  push:
    tags: ['v*.*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x86_64
            pkg: tar
          - os: macos-latest
            target: macos-aarch64
            pkg: dmg
          - os: macos-13
            target: macos-x86_64
            pkg: dmg
          - os: windows-latest
            target: windows-x86_64
            pkg: zip

    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # Do NOT pass -Dtarget — it disables system library discovery
      # (pkg-config on Linux, framework search paths on macOS).
      # Each runner is already the native arch for its target.
      - name: Build
        run: zig build -Doptimize=ReleaseSmall -Dversion=${{ github.ref_name }}

      - name: Package tarball (Linux)
        if: matrix.pkg == 'tar'
        run: |
          chmod +x zig-out/bin/krustyklaw
          tar -czf krustyklaw-${{ matrix.target }}.tar.gz -C zig-out/bin krustyklaw

      - name: Package DMG (macOS)
        if: matrix.pkg == 'dmg'
        run: |
          mkdir -p "KrustyKlaw.app/Contents/MacOS"
          cp zig-out/bin/krustyklaw "KrustyKlaw.app/Contents/MacOS/"
          chmod +x "KrustyKlaw.app/Contents/MacOS/krustyklaw"
          cat > "KrustyKlaw.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>krustyklaw</string>
            <key>CFBundleName</key>
            <string>KrustyKlaw</string>
            <key>CFBundleIdentifier</key>
            <string>io.nullclaw.krustyklaw</string>
            <key>CFBundleVersion</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          EOF
          hdiutil create -volname "KrustyKlaw" -srcfolder "KrustyKlaw.app" -ov -format UDZO krustyklaw-${{ matrix.target }}.dmg

      - name: Package zip (Windows)
        if: matrix.pkg == 'zip'
        shell: pwsh
        run: Compress-Archive -Path zig-out/bin/krustyklaw.exe -DestinationPath krustyklaw-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            krustyklaw-*.tar.gz
            krustyklaw-*.dmg
            krustyklaw-*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
