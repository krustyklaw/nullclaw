name: Release

on:
  push:
    tags: ['v*.*']
  pull_request:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v1
        with:
          version: "0.15.2"

      # Only needed for the native Linux build's AppImage packaging
      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev pkg-config

      - name: Cross-compile all targets
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          declare -A TARGETS=(
            [linux-x86_64]=x86_64-linux-gnu
            [macos-aarch64]=aarch64-macos
            [macos-x86_64]=x86_64-macos
            [windows-x86_64]=x86_64-windows
            [windows-aarch64]=aarch64-windows
          )

          for NAME in "${!TARGETS[@]}"; do
            echo "::group::Building $NAME"
            zig build -Doptimize=ReleaseSmall -Dtarget="${TARGETS[$NAME]}" -Dversion="$VERSION"

            # Move artifacts to a flat staging dir
            mkdir -p dist
            if [[ "$NAME" == windows-* ]]; then
              cp zig-out/bin/nullclaw.exe "dist/nullclaw-${NAME}.exe"
            else
              cp zig-out/bin/nullclaw "dist/nullclaw-${NAME}"
            fi
            echo "::endgroup::"
          done

      # --- Linux AppImage ---
      - name: Package AppImage
        uses: miurahr/install-linuxdeploy-action@v1
        with:
          plugins: gtk

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/nullclaw-linux-x86_64 AppDir/usr/bin/nullclaw
          chmod +x AppDir/usr/bin/nullclaw
          printf "[Desktop Entry]\nName=Nullclaw\nExec=nullclaw\nIcon=nullclaw\nType=Application\nCategories=Utility;AI;" > AppDir/nullclaw.desktop
          cp nullclaw.png AppDir/nullclaw.png
          DEPLOY_GTK_VERSION=3 linuxdeploy-x86_64.AppImage --appdir AppDir --plugin gtk --output appimage
          mv Nullclaw-*.AppImage dist/nullclaw-linux-x86_64.AppImage
          rm dist/nullclaw-linux-x86_64  # remove raw binary, AppImage replaces it

      # --- macOS DMGs ---
      # Note: hdiutil is macOS-only. On Linux, use genisoimage or just ship .tar.gz instead.
      # This step creates simple .tar.gz archives as a cross-platform alternative.
      - name: Package macOS archives
        run: |
          for ARCH in aarch64 x86_64; do
            mkdir -p "Nullclaw-${ARCH}.app/Contents/MacOS"
            cp "dist/nullclaw-macos-${ARCH}" "Nullclaw-${ARCH}.app/Contents/MacOS/nullclaw"
            chmod +x "Nullclaw-${ARCH}.app/Contents/MacOS/nullclaw"
            tar -czf "dist/nullclaw-macos-${ARCH}.tar.gz" "Nullclaw-${ARCH}.app"
            rm "dist/nullclaw-macos-${ARCH}"  # remove raw binary
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-platforms
          path: dist/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
